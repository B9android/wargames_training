# configs/scenarios/river_crossing.yaml
# Joint scenario: Blue infantry must cross a river at ford or bridge points
# while Red defenders hold the far bank.  Blue gunboats provide fire support
# along the river.
#
# E10.1 — Naval Unit Type & Coastal Operations

# ── Map ───────────────────────────────────────────────────────────────────
map:
  width: 5000.0
  height: 3000.0
  rows: 30
  cols: 50
  type: coastal

coastal:
  sea_cols: 0           # no open sea — river scenario
  beach_col: 0          # no beach
  river_row_start: 13   # river cuts across the middle (rows 13–17)
  river_row_end: 17
  ford_col: 20          # ford crossing at column 20 (~2000 m)
  bridge_col: 35        # bridge crossing at column 35 (~3500 m)

# ── Blue forces ───────────────────────────────────────────────────────────
blue:
  ships:
    - id: gunboat_1
      ship_type: gunboat
      x: 1800.0
      y: 1500.0    # in the river band (rows 13–17 ≈ y 1300–1700)
      theta: 0.0
      strength: 1.0
    - id: gunboat_2
      ship_type: gunboat
      x: 2800.0
      y: 1500.0
      theta: 0.0
      strength: 1.0

  units:
    - id: lead_battalion
      x: 800.0
      y: 1500.0
      theta: east
      strength: 1.0
    - id: support_battalion
      x: 600.0
      y: 1500.0
      theta: east
      strength: 1.0

  crossings:
    - id: ford_crossing
      unit_id: lead_battalion
      crossing_x: 2000.0    # ford column ~20 × (5000/50) = 2000 m
      crossing_y: 1500.0
    - id: bridge_crossing
      unit_id: support_battalion
      crossing_x: 3500.0    # bridge column ~35 × (5000/50) = 3500 m
      crossing_y: 1500.0

# ── Red forces (far-bank defenders) ──────────────────────────────────────
red:
  units:
    - id: flank_guard_1
      x: 2200.0
      y: 1200.0
      theta: west
      strength: 1.0
    - id: flank_guard_2
      x: 2200.0
      y: 1800.0
      theta: west
      strength: 1.0
    - id: bridge_guard
      x: 3700.0
      y: 1500.0
      theta: west
      strength: 0.9

# ── Episode parameters ────────────────────────────────────────────────────
episode:
  max_steps: 600
  blue_victory_condition: bridgehead_established   # both crossings complete
  red_victory_condition: crossing_repelled          # both crossing units destroyed
