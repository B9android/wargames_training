# configs/scenarios/naval_blockade.yaml
# Naval scenario: Blue ships-of-the-line and frigates blockade a Red port
# while Red gunboats attempt to break out along the river estuary.
#
# E10.1 — Naval Unit Type & Coastal Operations

# ── Map ───────────────────────────────────────────────────────────────────
map:
  width: 5000.0
  height: 3000.0
  rows: 30
  cols: 50
  type: coastal

coastal:
  sea_cols: 20          # wide sea zone for manoeuvre
  beach_col: 0          # port-side beach at col 0 — absorbed into sea band (sea_cols=20),
                        # so no beach strip blocks the sea–estuary route
  river_row_start: 12   # river estuary in the middle rows
  river_row_end: 18
  ford_col: 35          # upriver estuary shallows (ford-level depth), away from breakout route
  bridge_col: 40        # upriver estuary narrows with bridge, away from breakout route

# ── Blue forces (blockading squadron) ────────────────────────────────────
blue:
  ships:
    - id: blockade_line_1
      ship_type: ship_of_the_line
      x: 500.0
      y: 2400.0
      theta: 0.0
      strength: 1.0
    - id: blockade_line_2
      ship_type: ship_of_the_line
      x: 500.0
      y: 600.0
      theta: 0.0
      strength: 1.0
    - id: blockade_frigate_1
      ship_type: frigate
      x: 800.0
      y: 1500.0
      theta: 0.0
      strength: 1.0
    - id: blockade_frigate_2
      ship_type: frigate
      x: 200.0
      y: 1500.0
      theta: 0.0
      strength: 1.0

# ── Red forces (breakout attempt) ────────────────────────────────────────
red:
  ships:
    - id: red_gunboat_1
      ship_type: gunboat
      x: 2600.0
      y: 1400.0    # in river estuary
      theta: west
      strength: 1.0
    - id: red_gunboat_2
      ship_type: gunboat
      x: 2600.0
      y: 1600.0
      theta: west
      strength: 1.0
    - id: red_frigate
      ship_type: frigate
      x: 2200.0
      y: 1500.0
      theta: west
      strength: 1.0

# ── Episode parameters ────────────────────────────────────────────────────
episode:
  max_steps: 500
  blue_victory_condition: all_red_ships_sunk       # all Red vessels destroyed
  red_victory_condition: breakout_success          # Red ship reaches x < 300 (open sea)
