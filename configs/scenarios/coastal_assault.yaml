# configs/scenarios/coastal_assault.yaml
# Joint scenario: Blue naval vessels provide fire support for an amphibious
# assault landing Blue infantry on a defended beach.
#
# E10.1 — Naval Unit Type & Coastal Operations

# ── Map ───────────────────────────────────────────────────────────────────
map:
  width: 5000.0        # metres — wide coastal strip
  height: 3000.0
  rows: 30
  cols: 50
  type: coastal        # signals the loader to use CoastalMap

coastal:
  sea_cols: 10         # columns of open sea from x=0
  beach_col: 10        # column index of the beach landing zone
  river_row_start: 13  # no river in this scenario
  river_row_end: 13
  ford_col: 0
  bridge_col: 0

# ── Blue forces ───────────────────────────────────────────────────────────
blue:
  ships:
    - id: hms_victory
      ship_type: ship_of_the_line
      x: 300.0
      y: 1500.0
      theta: 0.0        # facing east (broadside = north/south)
      strength: 1.0
    - id: hms_enterprize
      ship_type: frigate
      x: 400.0
      y: 800.0
      theta: 0.0
      strength: 1.0

  landings:
    - id: marine_brigade
      vessel_id: hms_enterprize
      infantry_strength: 0.8
      beach_x: 1050.0   # centre of the beach column at map mid-height
      beach_y: 1500.0
      approach_radius: 200.0
      landing_steps: 8

# ── Red forces (coastal defenders) ───────────────────────────────────────
red:
  units:
    - id: coastal_battery_1
      x: 1500.0
      y: 1000.0
      theta: west        # facing the sea
      strength: 0.9
    - id: coastal_battery_2
      x: 1500.0
      y: 2000.0
      theta: west
      strength: 0.9
    - id: infantry_reserve
      x: 2000.0
      y: 1500.0
      theta: west
      strength: 1.0

# ── Episode parameters ────────────────────────────────────────────────────
episode:
  max_steps: 600
  blue_victory_condition: beach_established  # landing ESTABLISHED phase reached
  red_victory_condition: landing_repelled    # infantry_strength < 0.2 at LANDING phase
