# Experiment 1 settings
# Override defaults from configs/default.yaml for the first real training run.
#
# Usage:
#   python training/train.py --config configs/experiment_1.yaml

wandb:
  tags: ["v1", "ppo", "experiment-1"]

env:
  max_steps: 500

training:
  total_timesteps: 100000
  learning_rate: 3.0e-4
  n_steps: 1024
  batch_size: 64
  n_epochs: 5
  gamma: 0.99
  gae_lambda: 0.95
  ent_coef: 0.01
  seed: 1

eval:
  n_eval_episodes: 20
  eval_freq: 10000
  checkpoint_freq: 25000

