# Default hyperparameters & settings
#
# Override any value in a per-experiment file (e.g. configs/experiment_1.yaml)
# or via Hydra CLI: python training/train.py training.learning_rate=3e-4

# ── W&B experiment tracking ───────────────────────────────────────────────
wandb:
  project: "wargames_training"       # W&B project name — must match the project created at wandb.ai
  entity: null                       # W&B team/org name (null → personal account)
  tags: ["v1", "ppo"]
  log_freq: 1000                     # log every N timesteps

# ── Environment ───────────────────────────────────────────────────────────
env:
  map_width: 1000.0                  # metres
  map_height: 1000.0
  max_steps: 500
  num_envs: 8                        # parallel training environments
  randomize_terrain: true            # generate new terrain each episode
  hill_speed_factor: 0.5             # speed multiplier on max-elevation hills

# ── PPO training ──────────────────────────────────────────────────────────
training:
  algorithm: "PPO"
  total_timesteps: 1000000
  learning_rate: 3.0e-4
  n_steps: 2048                      # rollout steps per env before update
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  seed: 42

# ── Evaluation ────────────────────────────────────────────────────────────
eval:
  n_eval_episodes: 20
  eval_freq: 50000                   # evaluate every N timesteps
  checkpoint_freq: 100000            # save checkpoint every N timesteps
  checkpoint_dir: "checkpoints/"

# ── Logging ───────────────────────────────────────────────────────────────
logging:
  level: "INFO"
  log_dir: "logs/"
