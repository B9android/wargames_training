name: "🏷️ Bootstrap: Labels & Milestones"

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run mode — print planned changes without mutating GitHub"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: bootstrap-labels-milestones
  cancel-in-progress: false

permissions:
  issues: write
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PyGithub pyyaml

      - name: Run label & milestone bootstrap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        working-directory: scripts/project_agent
        run: python setup_labels_and_milestones.py
