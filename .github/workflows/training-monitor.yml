name: "📊 Training Run Monitor"

on:
  workflow_dispatch:
    inputs:
      wandb_run_id:
        description: "W&B Run ID (entity/project/run_id)"
        required: true
      issue_number:
        description: "GitHub Issue number for this experiment"
        required: true

permissions:
  issues: write

jobs:
  post-results:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install PyGithub wandb

      - name: Fetch W&B results and post to issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          REPO_NAME: ${{ github.repository }}
          WANDB_RUN_ID: ${{ github.event.inputs.wandb_run_id }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
        run: python scripts/project_agent/training_monitor.py
