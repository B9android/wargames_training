name: "🤖 Agent: Write Follow-up Issues"

on:
  workflow_dispatch:
    inputs:
      context:
        description: "Context for the agent (e.g. 'training run completed, reward plateaued at 2.3')"
        required: true
        type: string
      target_version:
        description: "Target version for new issues"
        required: false
        default: "v1"
        type: choice
        options: ["v1", "v2", "v3", "v4"]

permissions:
  issues: write
  contents: read

jobs:
  write-issues:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install PyGithub openai
      - name: Run issue writer agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REPO_NAME: ${{ github.repository }}
          AGENT_CONTEXT: ${{ github.event.inputs.context }}
          TARGET_VERSION: ${{ github.event.inputs.target_version }}
        run: python scripts/project_agent/issue_writer.py
