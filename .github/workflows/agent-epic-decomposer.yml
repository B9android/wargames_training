name: "🤖 Agent: Epic Decomposer"

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Epic issue number to decompose"
        required: true
      repo_name:
        description: "Repository (owner/name)"
        required: false
      dry_run:
        description: "Dry-run mode (no GitHub writes)"
        type: boolean
        default: false

permissions:
  issues: write
  contents: read

jobs:
  decompose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PyGithub pyyaml

      - name: Run epic decomposer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EPIC_NUMBER: ${{ github.event.inputs.issue_number }}
          REPO_NAME: ${{ github.event.inputs.repo_name || github.repository }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        working-directory: scripts/project_agent
        run: python epic_decomposer.py
