name: "🤖 Agent: Milestone Health Check"

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run mode (no GitHub writes)"
        type: boolean
        default: false

concurrency:
  group: agent-milestone-check
  cancel-in-progress: false

permissions:
  issues: write
  contents: read

jobs:
  milestone-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install PyGithub
      - name: Preflight secrets
        run: |
          if [ -z "${{ secrets.GITHUB_TOKEN }}" ]; then
            echo "GITHUB_TOKEN is required" >&2
            exit 1
          fi
      - name: Run milestone health check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/project_agent/milestone_checker.py
