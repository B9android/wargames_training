name: "🤖 Agent: Issue Triage"

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to triage (required for manual trigger)"
        required: true
      dry_run:
        description: "Dry-run mode (no GitHub writes)"
        type: boolean
        default: false

concurrency:
  group: agent-triage-${{ github.event.inputs.issue_number }}
  cancel-in-progress: false

permissions:
  issues: write
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PyGithub openai pyyaml

      - name: Preflight secrets
        run: |
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "OPENAI_API_KEY not set. Triage will run in rule-first mode only."
          fi
          if [ -z "${{ secrets.GITHUB_TOKEN }}" ]; then
            echo "GITHUB_TOKEN is required" >&2
            exit 1
          fi

      - name: Run triage agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          REPO_NAME: ${{ github.repository }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/project_agent/triage_agent.py
