name: "CI: Ray Distributed Smoke Test (E4.7)"
# Smoke test for the Ray 2-worker distributed rollout runner.
# Validates that the actor pool starts up, collects episodes in parallel,
# and shuts down cleanly within the allowed time budget.

on:
  push:
    paths:
      - "envs/remote_multi_battalion_env.py"
      - "training/league/distributed_runner.py"
      - "configs/distributed/ray_cluster.yaml"
      - "tests/test_distributed_runner.py"
      - ".github/workflows/ray_smoke_test.yml"
  pull_request:
    paths:
      - "envs/remote_multi_battalion_env.py"
      - "training/league/distributed_runner.py"
      - "configs/distributed/ray_cluster.yaml"
      - "tests/test_distributed_runner.py"
      - ".github/workflows/ray_smoke_test.yml"
  workflow_dispatch:

concurrency:
  group: ray-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ray_smoke_test:
    name: "Ray 2-worker smoke test"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ray-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-ray-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install core sim deps + Ray (rllib extras needed for RLlib integration)
          pip install \
            "ray[rllib]>=2.9.0" \
            "gymnasium>=0.29.0" \
            "pettingzoo>=1.24.0" \
            "numpy>=1.26.0" \
            "torch>=2.1.0" \
            "scipy>=1.12.0" \
            "pygame>=2.5.0" \
            "pyyaml>=6.0" \
            "pytest>=8.0.0"

      - name: Run Ray smoke test (2 workers, 4 episodes)
        timeout-minutes: 4
        env:
          RAY_DISABLE_IMPORT_WARNING: "1"
          # Limit Ray to 2 CPUs so the test is predictable on ubuntu-latest
          # which typically has 2 cores.
          OMP_NUM_THREADS: "1"
        run: |
          python -m pytest tests/test_distributed_runner.py \
            -v \
            --timeout=240 \
            -k "smoke" \
            2>&1

      - name: Run full distributed runner tests
        timeout-minutes: 4
        env:
          RAY_DISABLE_IMPORT_WARNING: "1"
          OMP_NUM_THREADS: "1"
        run: |
          python -m pytest tests/test_distributed_runner.py \
            -v \
            --timeout=240 \
            2>&1
