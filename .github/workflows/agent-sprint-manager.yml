name: "🤖 Agent: Sprint Manager"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Sprint action (start, close, auto-transition)"
        type: choice
        options:
          - start
          - close
          - auto-transition
        default: auto-transition
      sprint_name:
        description: "Sprint name (required for start/close)"
        required: false
      repo_name:
        description: "Repository (owner/name)"
        required: false
      dry_run:
        description: "Dry-run mode (no GitHub writes)"
        type: boolean
        default: false

  schedule:
    # Auto-transition sprints daily at 6 AM UTC
    - cron: "0 6 * * *"

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  manage_sprint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PyGithub pyyaml

      - name: Run sprint manager
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTION: ${{ github.event.inputs.action || 'auto-transition' }}
          SPRINT_NAME: ${{ github.event.inputs.sprint_name }}
          REPO_NAME: ${{ github.event.inputs.repo_name || github.repository }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        working-directory: scripts/project_agent
        run: python sprint_manager.py
