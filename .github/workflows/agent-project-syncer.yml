name: Agent - Project Syncer

on:
  issues:
    types: [labeled, unlabeled, milestoned, demilestoned]
  pull_request:
    types: [labeled, unlabeled]

jobs:
  sync-labels-to-project:
    name: Sync GitHub Labels to Project Board Fields
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]' && !contains(github.event.issue.body || '', '<!-- agent-skip-sync -->')
    permissions:
      issues: read
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub

      - name: Sync issue labels to project fields
        if: github.event_name == 'issues'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          DRY_RUN: "false"
        run: |
          python scripts/project_agent/project_syncer.py

      - name: Sync PR labels to project fields
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.pull_request.number }}
          DRY_RUN: "false"
        run: |
          python scripts/project_agent/project_syncer.py
