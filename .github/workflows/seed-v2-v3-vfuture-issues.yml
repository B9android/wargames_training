name: "🗺️ Seed v2/v3/v4/v5 Roadmap Issues"

# Triggered manually.  Idempotent — skips issues that already exist.
# Run this once after v1 milestones are complete to populate the full
# v2/v3/v4/v5 backlog in GitHub Issues.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (print planned issues without creating them)"
        type: boolean
        default: false

concurrency:
  group: seed-v2-v3-vfuture-${{ github.ref }}
  cancel-in-progress: false

permissions:
  issues: write
  contents: read

jobs:
  setup-labels-milestones:
    name: "Bootstrap v2–v5 labels & milestones"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PyGithub PyYAML

      - name: Bootstrap labels and milestones (M5–M10 + v2–v5 labels)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
          DRY_RUN: ${{ inputs.dry_run }}
        working-directory: scripts/project_agent
        run: python setup_labels_and_milestones.py

  seed-issues:
    name: "Seed v2/v3/v4/v5 roadmap issues"
    runs-on: ubuntu-latest
    needs: setup-labels-milestones
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PyGithub

      - name: Seed v2/v3/v4/v5 roadmap issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
          DRY_RUN: ${{ inputs.dry_run }}
        working-directory: scripts/project_agent
        run: python seed_v2_v3_vfuture_issues.py
