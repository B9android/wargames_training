name: "🧪 Experiment: Kickoff & Validation"

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to process (required for manual trigger)"
        required: true
      dry_run:
        description: "Dry-run mode (no GitHub writes)"
        type: boolean
        default: false

concurrency:
  group: experiment-kickoff-${{ github.event.inputs.issue_number }}
  cancel-in-progress: false

permissions:
  issues: write
  contents: read

jobs:
  validate_experiment:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PyGithub pyyaml

      - name: Preflight secrets
        run: |
          if [ -z "${{ secrets.GITHUB_TOKEN }}" ]; then
            echo "GITHUB_TOKEN is required" >&2
            exit 1
          fi

      - name: Validate and process experiment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          REPO_NAME: ${{ github.repository }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/project_agent/experiment_kickoff.py
