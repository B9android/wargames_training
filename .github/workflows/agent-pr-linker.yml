name: "🤖 Agent: PR Linker"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to process"
        required: true
      repo_name:
        description: "Repository (owner/name)"
        required: false
      dry_run:
        description: "Dry-run mode (no GitHub writes)"
        type: boolean
        default: false

  pull_request:
    types: [opened, synchronize, closed]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  link_pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PyGithub pyyaml

      - name: Run PR linker (dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          REPO_NAME: ${{ github.event.inputs.repo_name || github.repository }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        working-directory: scripts/project_agent
        run: python pr_linker.py

      - name: Run PR linker (webhook)
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_NAME: ${{ github.repository }}
          DRY_RUN: 'false'
        working-directory: scripts/project_agent
        run: python pr_linker.py
