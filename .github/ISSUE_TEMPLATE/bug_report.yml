name: "🐛 Bug Report"
description: "Something is broken"
title: "[BUG] "
labels: ["type: bug", "priority: high"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run `python training/train.py`
        2. After 10k steps...
        3. Error appears
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: Ubuntu 22.04
        - Python: 3.11
        - PyTorch: 2.1
        - SB3: 2.3
        - Git commit: abc1234

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Tracebacks
      render: shell
